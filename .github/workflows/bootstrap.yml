name: Bootstrap Mneme

on:
  push:
    branches: [main]
    paths:
      - bootstrap/mneme.tar.gz.b64

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Expand validated source payload
        run: |
          base64 --decode bootstrap/mneme.tar.gz.b64 > /tmp/mneme.tar.gz
          test "$(sha256sum /tmp/mneme.tar.gz | cut -d' ' -f1)" = "ea521908775b7d3d1471840510d5643dbfe17a5ebfcdd9ffabc393f9d8cb6ece"
          tar -xzf /tmp/mneme.tar.gz
          rm -rf bootstrap .github/workflows/bootstrap.yml
      - name: Validate source
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pytest
          ruff check .
          python -m compileall -q src
          PYTHONPATH=src python scripts/export_schemas.py
          PYTHONPATH=src python scripts/generate_platform_matrix.py
          git diff --exit-code -- schemas docs/PLATFORM-MATRIX.md
      - name: Publish foundation
        run: |
          git config user.name "mneme-bootstrap[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Mneme semantic continuity foundation"
          git push origin HEAD:main
