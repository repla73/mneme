capture_contract:
- Use the shared browser companion for guaranteed local capture.
- Grok Skills may provide persistent instructions and an explicit handover interface,
  but do not replace the ledger.
handover_contract:
- Expose a user-triggered handover skill.
- Keep scheduled Grok Automations separate from the per-session continuity ledger.
limitations:
- No official native post-turn lifecycle hook for Grok Web was verified.
- Web UI and skill behavior may change independently of the local companion.
source_urls:
